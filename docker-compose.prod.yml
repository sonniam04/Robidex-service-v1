services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: robidex
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d robidex"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/robidex
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${SITE_URL}
      PORT: 8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_SITE_URL: ${SITE_URL}
    environment:
      PORT: 3000
    volumes:
      - uploads:/app/public/Banner
      - uploads_guide:/app/public/guide
      - uploads_redeem:/app/public/howtoredeem
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
  uploads_guide:
  uploads_redeem:
